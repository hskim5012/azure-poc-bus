apiVersion: v1
kind: Secret
metadata:
  name: asb-secrets
type: Opaque
stringData:
  # IMPORTANT: Do not commit the actual connection string to version control
  # Replace 'your_connection_string_here' with your actual Azure Service Bus connection string, or apply it directly via:
  # kubectl create secret generic asb-secrets --from-literal=AZURE_SERVICEBUS_CONNECTION_STRING='Endpoint=sb://...'
  AZURE_SERVICEBUS_CONNECTION_STRING: "your_connection_string_here"

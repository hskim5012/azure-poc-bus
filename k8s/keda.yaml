apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: asb-trigger-auth
spec:
  secretTargetRef:
    - parameter: connection
      name: asb-secrets 
      key: AZURE_SERVICEBUS_CONNECTION_STRING
---
# 1) Java Claim Loading Scaler
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: claim-loading-scaledobject
  labels:
    app: claim-loading-worker
spec:
  scaleTargetRef:
    name: claim-loading-worker
  minReplicaCount: 0
  maxReplicaCount: 1
  pollingInterval: 15
  cooldownPeriod: 90
  triggers:
    - type: azure-servicebus
      metadata:
        topicName: workflow-events-topic
        subscriptionName: claim-loading-sub
        messageCount: "1"
      authenticationRef:
        name: asb-trigger-auth
---
# 2) C# Claim Audit Scaler
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: claim-audit-scaledobject
  labels:
    app: claim-audit-worker
spec:
  scaleTargetRef:
    name: claim-audit-worker
  minReplicaCount: 0
  maxReplicaCount: 1
  pollingInterval: 15
  cooldownPeriod: 90
  triggers:
    - type: azure-servicebus
      metadata:
        topicName: workflow-events-topic
        subscriptionName: claim-audit-sub
        messageCount: "1"
      authenticationRef:
        name: asb-trigger-auth
---
# 3) Node.js B1/B2 Orchestrator Scaler
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: asb-worker-scaledobject
  labels:
    app: asb-worker
spec:
  scaleTargetRef:
    name: asb-worker
  minReplicaCount: 0
  maxReplicaCount: 1
  pollingInterval: 15
  cooldownPeriod: 90
  triggers:
    - type: azure-servicebus
      metadata:
        topicName: workflow-events-topic
        subscriptionName: b1-move-sub
        messageCount: "1"
      authenticationRef:
        name: asb-trigger-auth
    - type: azure-servicebus
      metadata:
        topicName: workflow-events-topic
        subscriptionName: b2-move-sub
        messageCount: "1"
      authenticationRef:
        name: asb-trigger-auth

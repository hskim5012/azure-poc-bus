apiVersion: batch/v1
kind: CronJob
metadata:
  name: asb-workflow-trigger
  labels:
    app: asb-trigger
spec:
  schedule: "*/15 * * * *"
  timeZone: "America/Chicago"
  suspend: true
  startingDeadlineSeconds: 300
  # Don't run concurrently if the previous job is still somehow running
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 10
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: asb-trigger
        spec:
          restartPolicy: OnFailure
          containers:
          - name: trigger
            image: accesshealthpoc.azurecr.io/asb-worker:latest  # Note: Uses the exact same Docker image as the worker!
            imagePullPolicy: IfNotPresent
            # We override the command to run the trigger script instead of the worker script
            command: ["npm", "run", "start:trigger"]
            env:
            - name: NODE_ENV
              value: "production"
            - name: AZURE_SERVICEBUS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: asb-secrets
                  key: AZURE_SERVICEBUS_CONNECTION_STRING
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "250m"
                memory: "256Mi"
